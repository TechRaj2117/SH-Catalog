<!DOCTYPE html>
<html>
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    html, body {
      height: 100%;      /* Make html and body full height */
      margin: 0;         /* Remove default margins */
      padding: 0;        /* Remove default padding */
      overflow: hidden;  /* Optional: remove scrollbars */
    }
    iframe {
      width: 100%;
      height: 100%;
      border: none;
    }
  </style>
</head>
<body>
<iframe src="https://script.google.com/macros/s/AKfycbwRCw8OO1kjMjZq8XiIHpq43ayJPeYPFsDJ6ht2Rg_iwUQxS6IChZq3UCX9wWEx6A5dTw/exec" title="Iframe Example"></iframe>
</body>
</html>
