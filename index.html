  <style>
    html, body {
      height: 100%;      /* Make html and body full height */
      margin: 0;         /* Remove default margins */
      padding: 0;        /* Remove default padding */
      overflow: hidden;  /* Optional: remove scrollbars */
    }
    iframe {
      width: 100%;
      height: 100%;
      border: none;
    }
  </style>
</head>

<iframe src="https://script.google.com/macros/s/AKfycbxrp6E87zyqO1NAQkQ3VR4javrY8sO_Wq1YqO0xF4hqiwghbKNJcIYsI8xnrq1k3FvvLg/exec" title="Iframe Example"></iframe>

</html>
